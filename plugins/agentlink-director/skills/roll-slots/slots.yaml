# Art Director slot vocabulary.
# Edit freely; the roll job reads this on each run.
# Bump `version` on breaking schema changes so the job can refuse to run on a mismatch.

version: 1

# ───────────────────────────────────────────────────────────────
# Global constraints — enforced by the roll job, not the LLM.
# ───────────────────────────────────────────────────────────────
constraints:
  - id: tactile_anchor
    description: At least one of medium or process must be tactile/analog.
    type: at_least_one_tag
    slots: [medium, process]
    tag: tactile

  - id: no_recent_repeat
    description: A slot value cannot repeat within the last N months for that slot.
    type: no_repeat_within_months
    months: 6

  - id: max_roll_attempts
    description: If constraints can't be satisfied in this many tries, fail loudly.
    type: roll_budget
    attempts: 50

# ───────────────────────────────────────────────────────────────
# Slots. Each slot picks `pick` value(s) from `values`.
# `weights` are optional; default uniform.
# `tags` are free-form; constraints reference them by name.
# ───────────────────────────────────────────────────────────────
slots:

